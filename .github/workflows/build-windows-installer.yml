name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify
        run: npm.cmd run verify

      - name: Build installer
        run: npm.cmd run package:windows-exe

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: AudioSeparator-Windows-Full-Installer
          path: Releases/*-Windows-Full-Installer.exe
